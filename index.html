<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
                        /* The structure*/
    <div class="card">
    
    <div class="image-container"> 
        <img src="/AirPods_Max_de_color_Negro.png" alt="Wireless Headphones">
    </div>

    <div class="content">
        <span class="badge">BEST SELLER</span>
        <h1 class="title">Wireless Headphones</h1>
        <p class="price">$79.99</p>
        <p class="description">
        High quality sound, comfortable design and long battery life. Perfect for work, study or relaxation.
        </p>
        <button class="btn">Buy Now </button>
    </div>

    </div>

</body>
</html>
